<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanRetreat Homestay - Entry Form</title>
  <script type="module" crossorigin src="/assets/main-CtSn2ZIZ.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/firebase-BLB0_5KL.js">
  <link rel="stylesheet" crossorigin href="/assets/firebase-cEV_yCcV.css">
</head>
<body>
  <header>
    <div class="container">
      <div>
        <h1>UrbanRetreat Homestay</h1>
        <p class="subtitle">Accounts Entry</p>
      </div>
      <nav>
        <a href="dashboard.html">Owner Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="form-toggle">
      <button id="toggle-payment" class="active">Guest Payment</button>
      <button id="toggle-expenditure">Expenditure</button>
    </div>

    <div id="payment-section" class="form-section">
      <h2>Record Guest Payment</h2>
      <form id="payment-form">
        <div class="form-group">
          <label for="guest-name">Guest Name</label>
          <input type="text" id="guest-name" required placeholder="Enter guest name">
        </div>
        <div class="form-group">
          <label for="rooms">Number of Rooms Booked</label>
          <input type="number" id="rooms" min="1" required placeholder="e.g. 2">
        </div>
        <div class="form-group">
          <label for="payment-date">Date</label>
          <input type="date" id="payment-date" required>
        </div>
        <div class="form-group">
          <label for="amount-paid">Amount Paid (Rs)</label>
          <input type="number" id="amount-paid" min="0" step="0.01" required placeholder="e.g. 4500">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Record Payment</button>
      </form>
    </div>

    <div id="expenditure-section" class="form-section hidden">
      <h2>Record Expenditure</h2>
      <form id="expenditure-form">
        <div class="form-group">
          <label for="expense-desc">Description</label>
          <input type="text" id="expense-desc" required placeholder="e.g. Electricity bill">
        </div>
        <div class="form-group">
          <label for="expense-amount">Amount (Rs)</label>
          <input type="number" id="expense-amount" min="0" step="0.01" required placeholder="e.g. 1200">
        </div>
        <div class="form-group">
          <label for="expense-date">Date</label>
          <input type="date" id="expense-date" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Record Expenditure</button>
      </form>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <footer>
    <p>UrbanRetreat Homestay &copy; 2026</p>
  </footer>

</body>
</html>
